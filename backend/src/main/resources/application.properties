# Perfil ativo padrão — sobrescrito por variável de ambiente em produção
# Para rodar localmente: perfil dev é ativado automaticamente
spring.profiles.active=dev

# ─── BANCO DE DADOS (compartilhado) ──────────────────────────────────────────
# Não usamos mais Hibernate/JPA — o acesso a dados é feito com SQL puro
# (JdbcTemplate). O schema do banco é criado executando os scripts em database/.
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── SERVIDOR ────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# Observação: a API não usa mais JWT/Spring Security. Não há configuração de
# token aqui — todas as rotas são abertas (comunicação apenas com o frontend).
