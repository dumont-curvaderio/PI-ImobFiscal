# ─── PERFIL: dev (roda localmente com PostgreSQL local) ──────────────────────
# Ativar: automático via spring.profiles.active=dev no application.properties
#         ou: mvn spring-boot:run -Dspring-boot.run.profiles=dev

# Banco local — ajuste usuário/senha se necessário
spring.datasource.url=jdbc:postgresql://localhost:5432/imobfiscal
spring.datasource.username=postgres
spring.datasource.password=postgres

# Sem Hibernate: o schema NÃO é criado automaticamente. Crie as tabelas rodando
# os scripts em database/ na ordem: schema.sql, V2__motor_fiscal.sql, seed.sql.
#   psql -U postgres -d imobfiscal -f database/schema.sql
#   psql -U postgres -d imobfiscal -f database/V2__motor_fiscal.sql
#   psql -U postgres -d imobfiscal -f database/seed.sql

# Logging detalhado para debug
logging.level.br.fatec.imobfiscal=DEBUG
# Mostra o SQL que o JdbcTemplate executa (útil para depurar as queries na mão)
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG

# CORS — aceita chamadas do Next.js rodando localmente
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
