# ─── PERFIL: prod (Railway + Supabase) ───────────────────────────────────────
# Ativar: variável de ambiente SPRING_PROFILES_ACTIVE=prod no Railway
#
# Variáveis obrigatórias no Railway (Environment):
#   DB_PASSWORD  → senha do banco Supabase (Settings > Database)
#   JWT_SECRET   → string aleatória longa
#   CORS_ORIGINS → https://seu-app.vercel.app
#
# Usa o connection pooler do Supabase (IPv4, compatível com Railway)
# O pooler (Session mode, porta 5432) suporta prepared statements do Hibernate
spring.datasource.url=jdbc:postgresql://aws-0-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.vrmpbzctalmvroblrxjw
spring.datasource.password=${DB_PASSWORD}

# validate: só verifica se o schema bate com as entidades, nunca altera o banco
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Logging mínimo em produção
logging.level.br.fatec.imobfiscal=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# JWT vem de variável de ambiente
jwt.secret=${JWT_SECRET}

# CORS — apenas a URL do Vercel
app.cors.allowed-origins=${CORS_ORIGINS}
