# ─── PERFIL: prod (Render.com gratuito + Supabase) ───────────────────────────
# Ativar: variável de ambiente SPRING_PROFILES_ACTIVE=prod no Render
#
# Variáveis obrigatórias no painel do Render (Environment):
#   DB_URL      → jdbc:postgresql://db.<projeto>.supabase.co:5432/postgres
#   DB_USER     → postgres
#   DB_PASSWORD → senha do banco Supabase (Settings > Database)
#   JWT_SECRET  → string aleatória longa (gere em: openssl rand -base64 64)
#   CORS_ORIGINS → https://seu-app.vercel.app

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.data-source-properties.ssl=true

# validate: só verifica se o schema bate com as entidades, nunca altera o banco
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Logging mínimo em produção
logging.level.br.fatec.imobfiscal=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# JWT vem de variável de ambiente
jwt.secret=${JWT_SECRET}

# CORS — apenas a URL do Vercel
app.cors.allowed-origins=${CORS_ORIGINS}
