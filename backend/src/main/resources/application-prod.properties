# ─── PERFIL: prod (Railway + Railway PostgreSQL) ─────────────────────────────
# Usa o PostgreSQL interno do Railway — rede privada, sem IPv6, sem pooler externo
#
# Variáveis obrigatórias no Railway (injetadas automaticamente pelo serviço Postgres):
#   PGPASSWORD  → ${{Postgres.PGPASSWORD}} (referência Railway)
#   JWT_SECRET  → string aleatória longa
#   CORS_ORIGINS → https://pi-imob-fiscal.vercel.app
spring.datasource.url=jdbc:postgresql://postgres.railway.internal:5432/railway?sslmode=disable
spring.datasource.username=postgres
spring.datasource.password=${PGPASSWORD}

# update: cria ou atualiza tabelas conforme as entidades JPA (seguro para dev/PI)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Logging mínimo em produção
logging.level.br.fatec.imobfiscal=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# JWT vem de variável de ambiente
jwt.secret=${JWT_SECRET}

# CORS — apenas a URL do Vercel
app.cors.allowed-origins=${CORS_ORIGINS}
